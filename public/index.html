<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Validador de CEP — Dra. Charm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f3f0;color:#222;min-height:100vh}
header{padding:14px 24px;border-bottom:1px solid #e8e0d8;background:#fff;display:flex;align-items:center;gap:8px}
.brand{font-weight:700;color:#a0446a;font-size:15px}.sep{color:#ccc}.htitle{font-size:14px;color:#888}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.controls{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.field label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field input[type=date]{border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;color:#333;background:#fafafa;height:38px}
.field input[type=date]:focus{border-color:#a0446a}
.btn{height:38px;padding:0 18px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary{background:#a0446a;color:#fff}.btn-primary:hover{opacity:.88}
.btn-secondary{background:#fff;border:1.5px solid #ddd;color:#555}.btn-secondary:hover{background:#f8f8f8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}
.stat{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:28px;font-weight:700;margin-top:4px}
.sv-green{color:#16a34a}.sv-orange{color:#ea580c}.sv-red{color:#dc2626}
.prog-wrap{margin-top:20px;display:none}
.prog-bg{height:6px;background:#eee;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#a0446a;border-radius:3px;transition:width .2s;width:0}
.prog-text{font-size:12px;color:#888;margin-top:6px}
.filters{display:flex;align-items:center;gap:8px;margin:20px 0 12px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;font-size:13px;cursor:pointer;background:#fff;color:#555;font-weight:500;transition:all .15s}
.fbtn.active{background:#a0446a;border-color:#a0446a;color:#fff}
.ebtn{margin-left:auto;padding:6px 14px;border-radius:8px;border:1.5px solid #ddd;font-size:13px;cursor:pointer;background:#fff;color:#555;font-weight:500}
.ebtn:hover{background:#f0f0f0}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee}
tbody tr{border-bottom:1px solid #f5f5f5}tbody tr:last-child{border-bottom:none}
tbody td{padding:12px 14px;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.b-ok{background:#dcfce7;color:#16a34a}.b-div{background:#fff7ed;color:#ea580c}
.b-inv{background:#fee2e2;color:#dc2626}.b-load{background:#f5f5f5;color:#aaa}
.mono{font-family:monospace;font-size:13px}
.empty{text-align:center;padding:60px 0;color:#bbb}
.empty-icon{font-size:40px;margin-bottom:12px}
.err{background:#fee2e2;color:#dc2626;border-radius:8px;padding:12px 16px;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<header>
  <span class="brand">Dra. Charm</span>
  <span class="sep">/</span>
  <span class="htitle">Validador de CEP</span>
</header>
<div class="container">
  <div class="card">
    <div class="controls">
      <div class="field"><label>Data inicial</label><input type="date" id="dtI"></div>
      <div class="field"><label>Data final</label><input type="date" id="dtF"></div>
      <button class="btn btn-primary" id="btnB">Buscar pedidos</button>
      <button class="btn btn-secondary" id="btnH">Só hoje</button>
    </div>
    <div id="errMsg" class="err" style="display:none"></div>
    <div class="prog-wrap" id="pw">
      <div class="prog-bg"><div class="prog-fill" id="pf"></div></div>
      <div class="prog-text" id="pt">Buscando detalhes...</div>
    </div>
  </div>
  <div id="mainArea" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total de pedidos</div><div class="stat-value" id="sTotal">0</div></div>
      <div class="stat"><div class="stat-label">CEP OK</div><div class="stat-value sv-green" id="sOk">0</div></div>
      <div class="stat"><div class="stat-label">Divergência</div><div class="stat-value sv-orange" id="sDiv">0</div></div>
      <div class="stat"><div class="stat-label">CEP inválido</div><div class="stat-value sv-red" id="sInv">0</div></div>
    </div>
    <div class="filters">
      <button class="fbtn active" data-f="todos">Todos</button>
      <button class="fbtn" data-f="ok">✓ OK</button>
      <button class="fbtn" data-f="divergencia">⚠ Divergência</button>
      <button class="fbtn" data-f="invalido">✗ Inválido</button>
      <button class="ebtn" id="btnEx">↓ Exportar divergências</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table><thead><tr>
        <th>Pedido</th><th>Cliente</th><th>CEP</th><th>Cidade / UF</th><th>Status</th><th>Detalhe</th>
      </tr></thead><tbody id="tb"></tbody></table>
    </div>
  </div>
  <div class="card" id="initCard">
    <div class="empty"><div class="empty-icon">📦</div><p>Selecione o período e clique em <b>Buscar pedidos</b></p></div>
  </div>
</div>
<script>
const g = id => document.getElementById(id);
const todayStr = () => new Date().toISOString().slice(0,10);

g('dtI').value = todayStr();
g('dtF').value = todayStr();
g('btnH').onclick = () => { g('dtI').value = todayStr(); g('dtF').value = todayStr(); };

let pedidos = [], filter = 'todos', accessToken = null;
const cepCache = {};

function norm(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}

function valLocal(cep) {
  if (!cep || cep.length !== 8) return { s:'invalido', m:'CEP ausente ou incompleto' };
  if (/^0+$/.test(cep) || /^(\d)\1{7}$/.test(cep)) return { s:'invalido', m:'CEP inválido (sequência repetida)' };
  return { s:'ok', m:null };
}

async function valViaCep(cep, cidadeEsp, estadoEsp) {
  if (cepCache[cep]) return cepCache[cep];
  try {
    const r = await fetch('https://viacep.com.br/ws/'+cep+'/json/');
    const d = await r.json();
    if (d.erro) { cepCache[cep]={s:'invalido',m:'CEP não encontrado',cidade:'',estado:''}; }
    else {
      let s='ok', m=null;
      const cidade = d.localidade||'', estado = d.uf||'';
      if (cidadeEsp && cidade && norm(cidade)!==norm(cidadeEsp)) {
        s='divergencia'; m='Cidade: CEP aponta para '+cidade+'/'+estado+' mas pedido tem '+cidadeEsp;
      }
      cepCache[cep]={s,m,cidade,estado};
    }
    return cepCache[cep];
  } catch(_) {
    cepCache[cep]={s:'invalido',m:'Erro ao consultar ViaCEP',cidade:'',estado:''};
    return cepCache[cep];
  }
}

async function buscarDet(id) {
  try {
    const url = '/api/pedidos?id='+id+(accessToken?'&token='+encodeURIComponent(accessToken):'');
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch(_) { return null; }
}

async function processarLote(lista) {
  const total = lista.length;
  let done = 0;
  g('pw').style.display='block'; g('pf').style.width='0%';

  for (let i=0; i<lista.length; i+=10) {
    await Promise.all(lista.slice(i,i+10).map(async p => {
      const det = await buscarDet(p.id);
      const cep = det ? (det.cep||'') : '';
      const cidade = det ? (det.cidade||'') : '';
      const estado = det ? (det.estado||'') : '';
      p.cep=cep; p.cidade=cidade; p.estado=estado;
      p.endereco=det?(det.endereco||''):'';;

      const loc = valLocal(cep);
      if (loc.s==='invalido') { p.cep_s=loc.s; p.cep_m=loc.m; }
      else {
        const vc = await valViaCep(cep, cidade, estado);
        p.cep_s=vc.s; p.cep_m=vc.m||'';
        if (vc.cidade&&!cidade) { p.cidade=vc.cidade; p.estado=vc.estado; }
      }

      done++;
      const pct = Math.round((done/total)*100);
      g('pf').style.width=pct+'%';
      g('pt').textContent='Detalhes: '+done+' / '+total;
      renderRow(p); updateStats();
    }));
  }
  g('pw').style.display='none';
}

function fmtCep(c) {
  if (!c||c.length!==8) return c||'—';
  return c.slice(0,5)+'-'+c.slice(5);
}

const badges = {
  ok:'<span class="badge b-ok">✓ OK</span>',
  divergencia:'<span class="badge b-div">⚠ Divergência</span>',
  invalido:'<span class="badge b-inv">✗ Inválido</span>',
  carregando:'<span class="badge b-load">⏳ Buscando...</span>'
};

function renderRow(p) {
  let row = document.getElementById('r-'+p.id);
  const badge = badges[p.cep_s||'carregando']||badges.carregando;
  const cuf = p.cidade?(p.cidade+(p.estado?' / '+p.estado:'')):'— / —';
  const det = p.cep_m?('<span style="color:#888;font-size:12px">'+p.cep_m+'</span>'):'';
  const html = '<td>'+p.numero+'</td><td>'+(p.cliente||'')+'</td>'+
    '<td><span class="mono">'+fmtCep(p.cep)+'</span></td>'+
    '<td>'+cuf+'</td><td>'+badge+'</td><td>'+det+'</td>';
  if (!row) { row=document.createElement('tr'); row.id='r-'+p.id; g('tb').appendChild(row); }
  row.innerHTML=html; applyFilter();
}

function updateStats() {
  const ok=pedidos.filter(p=>p.cep_s==='ok').length;
  const dv=pedidos.filter(p=>p.cep_s==='divergencia').length;
  const inv=pedidos.filter(p=>p.cep_s==='invalido').length;
  g('sTotal').textContent=pedidos.length;
  g('sOk').textContent=ok; g('sDiv').textContent=dv; g('sInv').textContent=inv;
}

function applyFilter() {
  g('tb').querySelectorAll('tr').forEach(row => {
    const id=row.id.replace('r-','');
    const p=pedidos.find(x=>String(x.id)===id);
    if (!p) return;
    row.style.display=(filter==='todos'||filter===p.cep_s)?'':'none';
  });
}

document.querySelectorAll('.fbtn').forEach(b => {
  b.onclick=()=>{
    document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); filter=b.dataset.f; applyFilter();
  };
});

g('btnEx').onclick=()=>{
  const prob=pedidos.filter(p=>p.cep_s!=='ok');
  if (!prob.length){alert('Nenhuma divergência encontrada.');return;}
  const rows=prob.map(p=>
    [p.numero,p.cliente,p.cep,p.cidade,p.estado,p.cep_s,p.cep_m]
      .map(v=>'"'+(v||'')+'"').join(',')
  );
  const csv=['Pedido,Cliente,CEP,Cidade,UF,Status,Motivo',...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='divergencias_cep.csv'; a.click();
};

g('btnB').onclick=async()=>{
  const dtI=g('dtI').value, dtF=g('dtF').value;
  if(!dtI||!dtF){alert('Selecione o período');return;}
  g('errMsg').style.display='none';
  g('btnB').disabled=true; g('btnB').textContent='Buscando...';
  g('initCard').style.display='none'; g('mainArea').style.display='block';
  g('tb').innerHTML=''; pedidos=[]; accessToken=null; updateStats();

  try {
    let pag=1, fetched=0, total=null;
    while(true){
      const url='/api/pedidos?data_inicio='+dtI+'&data_fim='+dtF+'&pagina='+pag;
      const r=await fetch(url); const d=await r.json();
      if(!r.ok) throw new Error(d.erro||'Erro na API ('+r.status+')');

      // Guarda o access token para reutilizar nas chamadas de detalhe
      if (d._t) accessToken = d._t;

      if(total===null) total=d.total;
      const lote=d.pedidos||[];
      if(!lote.length) break;

      lote.forEach(p=>{ p.cep_s='carregando'; p.cep=''; pedidos.push(p); renderRow(p); });
      fetched+=lote.length; updateStats();

      await processarLote(lote);
      if(lote.length<100||fetched>=total) break;
      pag++;
    }
    if(!pedidos.length) {
      g('tb').innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:#bbb">Nenhum pedido no período</td></tr>';
    }
  } catch(err){
    g('errMsg').textContent=err.message; g('errMsg').style.display='block';
  }
  g('btnB').disabled=false; g('btnB').textContent='Buscar pedidos';
};
</script>
</body>
</html>

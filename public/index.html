<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Validador de CEP — Dra. Charm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f3f0;color:#222;min-height:100vh}
header{padding:14px 24px;border-bottom:1px solid #e8e0d8;background:#fff;display:flex;align-items:center;gap:8px}
header .brand{font-weight:700;color:#a0446a;font-size:15px}
header .sep{color:#ccc}
header .title{font-size:14px;color:#888}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.controls{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.field label{display:block;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field input[type=date]{border:1.5px solid #ddd;border-radius:8px;padding:8px 12px;font-size:14px;outline:none;color:#333;background:#fafafa;height:38px}
.field input[type=date]:focus{border-color:#a0446a}
.btn{height:38px;padding:0 18px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary{background:#a0446a;color:#fff}.btn-primary:hover{opacity:.88}
.btn-secondary{background:#fff;border:1.5px solid #ddd;color:#555}.btn-secondary:hover{background:#f8f8f8}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px}
.stat{background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:28px;font-weight:700;margin-top:4px}
.stat-value.green{color:#16a34a}.stat-value.orange{color:#ea580c}.stat-value.red{color:#dc2626}
.progress-wrap{margin-top:20px;display:none}
.progress-bar-bg{height:6px;background:#eee;border-radius:3px;overflow:hidden}
.progress-bar-fill{height:100%;background:#a0446a;border-radius:3px;transition:width .3s;width:0}
.progress-text{font-size:12px;color:#888;margin-top:6px}
.filters{display:flex;align-items:center;gap:8px;margin:20px 0 12px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #ddd;font-size:13px;cursor:pointer;background:#fff;color:#555;font-weight:500;transition:all .15s}
.filter-btn.active{background:#a0446a;border-color:#a0446a;color:#fff}
.export-btn{margin-left:auto;padding:6px 14px;border-radius:8px;border:1.5px solid #ddd;font-size:13px;cursor:pointer;background:#fff;color:#555;font-weight:500}
.export-btn:hover{background:#f0f0f0}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee}
tbody tr{border-bottom:1px solid #f5f5f5}
tbody tr:last-child{border-bottom:none}
tbody td{padding:12px 14px;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-ok{background:#dcfce7;color:#16a34a}
.badge-div{background:#fff7ed;color:#ea580c}
.badge-inv{background:#fee2e2;color:#dc2626}
.badge-load{background:#f5f5f5;color:#aaa}
.cep-mono{font-family:monospace;font-size:13px}
.empty{text-align:center;padding:60px 0;color:#bbb}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty p{font-size:14px}
.error-msg{background:#fee2e2;color:#dc2626;border-radius:8px;padding:12px 16px;font-size:13px;margin-top:12px}
</style>
</head>
<body>
<header>
  <span class="brand">Dra. Charm</span>
  <span class="sep">/</span>
  <span class="title">Validador de CEP</span>
</header>
<div class="container">
  <div class="card">
    <div class="controls">
      <div class="field">
        <label>Data inicial</label>
        <input type="date" id="dtInicio">
      </div>
      <div class="field">
        <label>Data final</label>
        <input type="date" id="dtFim">
      </div>
      <button class="btn btn-primary" id="btnBuscar">Buscar pedidos</button>
      <button class="btn btn-secondary" id="btnHoje">Só hoje</button>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Buscando detalhes dos pedidos...</div>
    </div>
  </div>

  <div id="statsArea" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total de pedidos</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="stat"><div class="stat-label">CEP OK</div><div class="stat-value green" id="statOk">0</div></div>
      <div class="stat"><div class="stat-label">Divergência</div><div class="stat-value orange" id="statDiv">0</div></div>
      <div class="stat"><div class="stat-label">CEP inválido</div><div class="stat-value red" id="statInv">0</div></div>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-filter="todos">Todos</button>
      <button class="filter-btn" data-filter="ok">✓ OK</button>
      <button class="filter-btn" data-filter="divergencia">⚠ Divergência</button>
      <button class="filter-btn" data-filter="invalido">✗ Inválido</button>
      <button class="export-btn" id="btnExport">↓ Exportar divergências</button>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead><tr>
          <th>Pedido</th><th>Cliente</th><th>CEP</th><th>Cidade / UF</th><th>Status</th><th>Detalhe</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="emptyState" style="display:none">
        <div class="empty-icon">📦</div>
        <p>Selecione o período e clique em <b>Buscar pedidos</b></p>
      </div>
    </div>
  </div>
  <div class="card" id="initialCard">
    <div class="empty">
      <div class="empty-icon">📦</div>
      <p>Selecione o período e clique em <b>Buscar pedidos</b></p>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

// Set default dates
function todayStr() { return new Date().toISOString().slice(0,10); }
$('dtInicio').value = todayStr();
$('dtFim').value = todayStr();

$('btnHoje').onclick = () => {
  $('dtInicio').value = todayStr();
  $('dtFim').value = todayStr();
};

let allPedidos = [];
let activeFilter = 'todos';
const cepCache = {};

function validarCepLocal(cep) {
  if (!cep || cep.length !== 8) return { status: 'invalido', motivo: 'CEP ausente ou incompleto' };
  if (/^0+$/.test(cep) || /^(\d)\1{7}$/.test(cep)) return { status: 'invalido', motivo: 'CEP inválido (sequência repetida)' };
  return { status: 'ok', motivo: null };
}

async function verificarViaCep(cep, enderecoEsperado, cidadeEsperada, estadoEsperado) {
  if (cepCache[cep] !== undefined) return cepCache[cep];
  try {
    const r = await fetch('https://viacep.com.br/ws/' + cep + '/json/');
    const d = await r.json();
    if (d.erro) { cepCache[cep] = { status:'invalido', motivo:'CEP não encontrado no ViaCEP', cidade:'', estado:'' }; }
    else {
      const cidade = d.localidade || '';
      const estado = d.uf || '';
      // Se cidade/estado foram preenchidos, verifica divergência
      let status = 'ok', motivo = null;
      if (cidadeEsperada && cidade && norm(cidade) !== norm(cidadeEsperada)) {
        status = 'divergencia';
        motivo = 'Cidade diverge: CEP é ' + cidade + '/' + estado + ' mas pedido tem ' + cidadeEsperada;
      }
      cepCache[cep] = { status, motivo, cidade, estado };
    }
    return cepCache[cep];
  } catch(_) {
    cepCache[cep] = { status:'invalido', motivo:'Erro ao consultar ViaCEP', cidade:'', estado:'' };
    return cepCache[cep];
  }
}

function norm(s) {
  if (!s) return '';
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'').trim();
}

async function buscarDetalhe(id) {
  try {
    const r = await fetch('/api/pedidos?id=' + id);
    if (!r.ok) return null;
    return await r.json();
  } catch(_) { return null; }
}

async function processarPedidos(lista) {
  const total = lista.length;
  let done = 0;

  $('progressWrap').style.display = 'block';
  $('progressFill').style.width = '0%';

  // Batch de 10 em paralelo
  for (let i = 0; i < lista.length; i += 10) {
    const lote = lista.slice(i, i + 10);
    await Promise.all(lote.map(async p => {
      const det = await buscarDetalhe(p.id);
      const cep = det ? det.cep || '' : '';
      const endereco = det ? det.endereco || '' : '';
      const cidade = det ? det.cidade || '' : '';
      const estado = det ? det.estado || '' : '';
      const complemento = det ? det.complemento || '' : '';
      const bairro = det ? det.bairro || '' : '';

      // Validação local primeiro
      const localCheck = validarCepLocal(cep);
      let status, motivo;

      if (localCheck.status === 'invalido') {
        status = 'invalido';
        motivo = localCheck.motivo;
      } else {
        // Verifica via ViaCEP
        const viaCepCheck = await verificarViaCep(cep, endereco, cidade, estado);
        status = viaCepCheck.status;
        motivo = viaCepCheck.motivo;
        // Atualiza cidade/estado com o do ViaCEP se disponível
        if (viaCepCheck.cidade) { p.cidadeViacep = viaCepCheck.cidade; p.estadoViacep = viaCepCheck.estado; }
      }

      p.cep = cep;
      p.endereco = endereco;
      p.cidade = cidade || (p.cidadeViacep || '');
      p.estado = estado || (p.estadoViacep || '');
      p.cep_status = status;
      p.cep_motivo = motivo || '';

      done++;
      const pct = Math.round((done / total) * 100);
      $('progressFill').style.width = pct + '%';
      $('progressText').textContent = 'Buscando detalhes: ' + done + ' / ' + total;

      // Atualiza a linha na tabela em tempo real
      renderRow(p);
      updateStats();
    }));
  }

  $('progressWrap').style.display = 'none';
}

function cepFormatado(cep) {
  if (!cep || cep.length !== 8) return cep || '—';
  return cep.substring(0,5) + '-' + cep.substring(5);
}

function renderRow(p) {
  let row = document.getElementById('row-' + p.id);
  const statusBadge = {
    'ok': '<span class="badge badge-ok">✓ OK</span>',
    'divergencia': '<span class="badge badge-div">⚠ Divergência</span>',
    'invalido': '<span class="badge badge-inv">✗ Inválido</span>',
    'carregando': '<span class="badge badge-load">⏳ Buscando...</span>',
  }[p.cep_status || 'carregando'] || '<span class="badge badge-load">⏳</span>';

  const cidadeUf = p.cidade ? (p.cidade + (p.estado ? ' / ' + p.estado : '')) : '— / —';
  const cepDisplay = '<span class="cep-mono">' + cepFormatado(p.cep) + '</span>';
  const detalhe = p.cep_motivo ? ('<span style="color:#888;font-size:12px">' + p.cep_motivo + '</span>') : '';

  const html = '<td>' + p.numero + '</td>' +
    '<td>' + (p.cliente || '') + '</td>' +
    '<td>' + cepDisplay + '</td>' +
    '<td>' + cidadeUf + '</td>' +
    '<td>' + statusBadge + '</td>' +
    '<td>' + detalhe + '</td>';

  if (!row) {
    row = document.createElement('tr');
    row.id = 'row-' + p.id;
    $('tbody').appendChild(row);
  }
  row.innerHTML = html;
  applyFilter();
}

function updateStats() {
  const ok = allPedidos.filter(p => p.cep_status === 'ok').length;
  const div = allPedidos.filter(p => p.cep_status === 'divergencia').length;
  const inv = allPedidos.filter(p => p.cep_status === 'invalido').length;
  $('statTotal').textContent = allPedidos.length;
  $('statOk').textContent = ok;
  $('statDiv').textContent = div;
  $('statInv').textContent = inv;
}

function applyFilter() {
  const rows = $('tbody').querySelectorAll('tr');
  rows.forEach(row => {
    const id = row.id.replace('row-','');
    const p = allPedidos.find(x => String(x.id) === id);
    if (!p) return;
    const show = activeFilter === 'todos' ||
      (activeFilter === 'ok' && p.cep_status === 'ok') ||
      (activeFilter === 'divergencia' && p.cep_status === 'divergencia') ||
      (activeFilter === 'invalido' && p.cep_status === 'invalido');
    row.style.display = show ? '' : 'none';
  });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilter();
  };
});

$('btnExport').onclick = () => {
  const problemas = allPedidos.filter(p => p.cep_status !== 'ok');
  if (!problemas.length) { alert('Nenhuma divergência encontrada.'); return; }
  const header = 'Pedido,Cliente,CEP,Cidade,UF,Status,Motivo';
  const rows = problemas.map(p =>
    [p.numero, p.cliente, p.cep, p.cidade, p.estado, p.cep_status, p.cep_motivo].map(v => '"' + (v||'') + '"').join(',')
  );
  const csv = [header, ...rows].join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'divergencias_cep.csv';
  a.click();
};

$('btnBuscar').onclick = async () => {
  const dtI = $('dtInicio').value;
  const dtF = $('dtFim').value;
  if (!dtI || !dtF) { alert('Selecione o período'); return; }

  $('errorMsg').style.display = 'none';
  $('btnBuscar').disabled = true;
  $('btnBuscar').textContent = 'Buscando...';
  $('initialCard').style.display = 'none';
  $('statsArea').style.display = 'block';
  $('tbody').innerHTML = '';
  allPedidos = [];
  updateStats();

  try {
    let pagina = 1, totalFetched = 0, totalExpected = null;
    while (true) {
      const url = '/api/pedidos?data_inicio=' + dtI + '&data_fim=' + dtF + '&pagina=' + pagina;
      const r = await fetch(url);
      const d = await r.json();
      if (!r.ok) throw new Error(d.erro || 'Erro na API');

      if (totalExpected === null) totalExpected = d.total;
      const lote = d.pedidos || [];
      if (!lote.length) break;

      // Adiciona com status "carregando"
      lote.forEach(p => { p.cep_status = 'carregando'; p.cep = ''; allPedidos.push(p); renderRow(p); });
      totalFetched += lote.length;
      updateStats();

      // Busca detalhes em paralelo
      await processarPedidos(lote);

      if (lote.length < 100 || totalFetched >= totalExpected) break;
      pagina++;
    }
  } catch(err) {
    $('errorMsg').textContent = err.message;
    $('errorMsg').style.display = 'block';
  }

  $('btnBuscar').disabled = false;
  $('btnBuscar').textContent = 'Buscar pedidos';
};
</script>
</body>
</html>

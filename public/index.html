<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',Arial,sans-serif;background:#f5f5f5;color:#171717;min-height:100vh}
.header{background:#ffe0e8;padding:20px 24px 20px;text-align:center}
.header-logo{display:block;margin:0 auto;height:54px;width:auto}
.header-sub{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:600;color:#c0527a;margin-top:10px;letter-spacing:.3px}
.container{max-width:1100px;margin:0 auto;padding:24px 24px 40px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.controls{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
.field label{display:block;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.field input[type=date],.field select{border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Roboto',sans-serif;outline:none;color:#333;background:#fafafa;height:42px}
.field input[type=date]:focus,.field select:focus{border-color:#ff3c6f}
.field select{cursor:pointer;min-width:200px}
.btn{height:42px;padding:0 22px;border:none;border-radius:999px;font-size:13px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:opacity .15s;letter-spacing:.3px}
.btn-primary{background:#ff3c6f;color:#fff}.btn-primary:hover{opacity:.88}
.btn-secondary{background:#fff;border:2px solid #ff3c6f;color:#ff3c6f}.btn-secondary:hover{background:#fff5f7}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:20px}
.stat{background:#fff5f7;border-radius:12px;padding:16px 12px;text-align:center;border:1.5px solid #ffe0e8}
.stat-label{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:700;margin-top:4px;color:#171717}
.sv-green{color:#00a86b}.sv-orange{color:#ff7c1d}.sv-amber{color:#f59e0b}.sv-red{color:#ff3c6f}
.prog-wrap{margin-top:16px;display:none}
.prog-bg{height:5px;background:#ffe0e8;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#ff3c6f;border-radius:3px;transition:width .2s;width:0}
.prog-text{font-size:12px;color:#999;margin-top:5px;font-family:'Roboto',sans-serif}
.filters{display:flex;align-items:center;gap:8px;margin:20px 0 12px;flex-wrap:wrap}
.fbtn{padding:7px 16px;border-radius:999px;border:2px solid #e0e0e0;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:700;cursor:pointer;background:#fff;color:#888;transition:all .15s;letter-spacing:.3px}
.fbtn.active{background:#ff3c6f;border-color:#ff3c6f;color:#fff}
.fbtn.a-ok.active{background:#00a86b;border-color:#00a86b}
.fbtn.a-div.active{background:#ff7c1d;border-color:#ff7c1d}
.fbtn.a-rua.active{background:#f59e0b;border-color:#f59e0b}
.ebtn{margin-left:auto;padding:7px 16px;border-radius:999px;border:2px solid #ff3c6f;font-size:12px;font-family:'Montserrat',sans-serif;font-weight:700;cursor:pointer;background:#fff;color:#ff3c6f;transition:all .15s}
.ebtn:hover{background:#fff5f7}
.table-wrap{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:12px 14px;text-align:left;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #ffe0e8;background:#fff5f7}
tbody tr{border-bottom:1px solid #fff0f4}tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#fffafb}
tbody td{padding:11px 14px;vertical-align:middle}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 11px;border-radius:999px;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif}
.b-ok{background:#e6f9f2;color:#00a86b}
.b-div{background:#fff3e6;color:#ff7c1d}
.b-rua{background:#fef3c7;color:#92400e}
.b-inv{background:#ffe8ee;color:#ff3c6f}
.b-load{background:#f5f5f5;color:#bbb}
.mono{font-family:'Courier New',monospace;font-size:12px;font-weight:600;color:#333}
.det-msg{font-size:11px;color:#888;font-family:'Roboto',sans-serif;margin-top:2px}
.empty{text-align:center;padding:60px 0}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;color:#bbb;font-family:'Roboto',sans-serif}
.empty b{color:#ff3c6f}
.err{background:#ffe8ee;color:#ff3c6f;border-radius:10px;padding:12px 16px;font-size:13px;margin-top:12px;border:1.5px solid #ffb3c6}
.footer{text-align:center;padding:28px 0 32px}
.footer-logo{height:36px;width:auto;opacity:.85}
.footer-copy{font-family:'Roboto',sans-serif;font-size:11px;color:#bbb;margin-top:8px}

@media(max-width:600px){
.header{padding:16px}.header-logo{height:40px}
.container{padding:12px 12px 32px}.card{padding:14px;border-radius:12px}
.controls{flex-direction:column;gap:10px}
.field input[type=date],.field select{font-size:16px;width:100%}
.btn{width:100%}
.stats{grid-template-columns:repeat(2,1fr);gap:8px}
.stats .stat:first-child{grid-column:1/-1}
.stat-value{font-size:20px}.stat-label{font-size:9px}
.filters{gap:5px}.fbtn,.ebtn{font-size:10px;padding:5px 10px}
.ebtn{margin-left:0;width:100%;margin-top:6px}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{font-size:12px;min-width:520px}
tbody td,thead th{padding:8px 10px}
.det{max-width:140px;font-size:10px}
.badge{font-size:10px;padding:3px 8px}
}
</style>

<body>

<div class="header">
  <img class="header-logo" src="https://cdn.awsli.com.br/1930/1930166/arquivos/logo-principal-dra--charm.png" alt="Dra. Charm">
  <p class="header-sub">Sistema Verificador de CEP Â· Pedidos</p>
</div>

<div class="container">
  <div class="card">
    <div class="controls">
      <div class="field"><label>Data inicial</label><input type="date" id="dtI"></div>
      <div class="field"><label>Data final</label><input type="date" id="dtF"></div>
      <div class="field">
        <label>SituaÃ§Ã£o</label>
        <select id="selSit">
          <option value="">Todas as situaÃ§Ãµes</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px"><button class="btn btn-primary" id="btnB">ð Buscar pedidos</button>
      <button class="btn btn-secondary" id="btnH">SÃ³ hoje</button></div>
    </div>

    <div class="prog-wrap" id="pw">
      <div class="prog-bg"><div class="prog-fill" id="pf"></div></div>

  <div id="mainArea" style="display:none">
    <div class="stats">
      <div class="stat"><div class="stat-label">Total</div><div class="stat-value" id="sTotal">0</div></div>
      <div class="stat"><div class="stat-label">CEP OK</div><div class="stat-value sv-green" id="sOk">0</div></div>
      <div class="stat"><div class="stat-label">DivergÃªncia</div><div class="stat-value sv-orange" id="sDiv">0</div></div>
      <div class="stat"><div class="stat-label">AtenÃ§Ã£o rua</div><div class="stat-value sv-amber" id="sRua">0</div></div>
      <div class="stat"><div class="stat-label">CEP InvÃ¡lido</div><div class="stat-value sv-red" id="sInv">0</div></div>
    </div>
    <div class="filters">
      <button class="fbtn active" data-f="todos">Todos</button>
      <button class="fbtn a-ok" data-f="ok">â OK</button>
      <button class="fbtn a-div" data-f="divergencia">â  DivergÃªncia cidade</button>
      <button class="fbtn a-rua" data-f="atencao_rua">â¡ AtenÃ§Ã£o rua</button>
      <button class="fbtn" data-f="invalido">â InvÃ¡lido</button>
      <button class="ebtn" id="btnEx">â Exportar problemas</button>
    </div>
    <div class="table-wrap">
      <table><thead><tr>
        <th>Pedido (LI)</th><th>Cliente</th><th>CEP</th><th>Cidade / UF</th><th>SituaÃ§Ã£o</th><th>Status CEP</th><th>Detalhe</th>
      </tr></thead><tbody id="tb"></tbody></table>
    </div>
  </div>

  <div class="card" id="initCard">
    <div class="empty"><div class="empty-icon">ð¦</div><p>Selecione o perÃ­odo e clique em <b>Buscar pedidos</b></p></div>
  </div>

  <div class="footer">
    <img class="footer-logo" src="https://cdn.awsli.com.br/1930/1930166/arquivos/logo-principal-horizontal.png" alt="Dra. Charm">
    <p class="footer-copy">Â© Dra Charm â Todos os direitos reservados.</p>
  </div>
</div>

<script>
// Mapa fixo de situacoes Bling (inclui customizadas da Dra. Charm)
window.__sitMap={6:'Em aberto',9:'Atendido',11:'Verificado',12:'Cancelado',15:'Em andamento',3:'Checkout parcial',4:'Aguardando pagamento',8:'Devolucao total',118079:'Atendido: TAYMAH'};

const g = id => document.getElementById(id);
const todayStr = () => new Date().toISOString().slice(0,10);
g('dtI').value = todayStr();
g('dtF').value = todayStr();
g('btnH').onclick = () => { g('dtI').value = todayStr(); g('dtF').value = todayStr(); };

// FIX: funÃ§Ãµes de token no escopo externo (necessÃ¡rio para cep_redo e accessToken global)
function lerTokenLocal(){
  try{
    const stored=JSON.parse(localStorage.getItem('bling_access')||'null');
    if(stored&&stored.token&&Date.now()<stored.exp) return stored.token;
  }catch(_){}
  return null;
}
function salvarTokenLocal(tok){
  try{
    localStorage.setItem('bling_access',JSON.stringify({token:tok,exp:Date.now()+55*60*1000}));
  }catch(_){}
}

// Carrega situacoes dinamicamente do Bling via /api/situacoes
async function carregarSituacoes() {
  try {
    const r = await fetch('/api/situacoes');
    const d = await r.json();
    const sel = g('selSit');
    (d.situacoes || []).forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      opt.textContent = s.nome;
      sel.appendChild(opt);
      window.__sitMap=window.__sitMap||{};window.__sitMap[s.id]=s.nome;
    });
  } catch(_) { /* usa fallback vazio */ }
}
carregarSituacoes();

// FIX: accessToken inicializado com valor do localStorage desde o inÃ­cio
let pedidos = [], filter = 'todos', accessToken = lerTokenLocal()||null;
const cepCache = {};

// FIX: cep_redo no escopo correto â auto-busca apÃ³s redirect OAuth
if(sessionStorage.getItem('cep_redo')){
  sessionStorage.removeItem('cep_redo');
  setTimeout(()=>document.getElementById('btnB').click(), 800);
}

function norm(s) {
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,'').trim();
}

// Similaridade simples: % de palavras em comum
function simWords(a, b) {
  const wa = norm(a).split(/\s+/).filter(Boolean);
  const wb = norm(b).split(/\s+/).filter(Boolean);
  if (!wa.length || !wb.length) return 0;
  const common = wa.filter(w => wb.includes(w)).length;
  return common / Math.max(wa.length, wb.length);
}

function valLocal(cep) {
  if (!cep || cep.length !== 8) return { s:'invalido', m:'CEP ausente ou com dÃ­gitos incompletos' };
  if (/^0+$/.test(cep) || /^(\d)\1{7}$/.test(cep)) return { s:'invalido', m:'CEP invÃ¡lido (sequÃªncia invÃ¡lida)' };
  return { s:'ok', m:null };
}

async function valViaCep(cep, cidadeEsp, estadoEsp, ruaEsp) {
  if (cepCache[cep]) return cepCache[cep];
  try {
    const r = await fetch('https://viacep.com.br/ws/'+cep+'/json/');
    const d = await r.json();
    if (d.erro) {
      cepCache[cep]={ s:'invalido', m:'CEP nÃ£o existe na base dos Correios', cidade:'', estado:'', rua:'' };
    } else {
      const cidadeVC = d.localidade||'', estadoVC = d.uf||'', ruaVC = d.logradouro||'';
      let s='ok', m=null;

      // 1. Valida cidade
      if (cidadeEsp && cidadeVC && norm(cidadeVC) !== norm(cidadeEsp)) {
        s='divergencia';
        m='Cidade divergente: CEP aponta '+cidadeVC+'/'+estadoVC+' mas pedido tem '+cidadeEsp+(estadoEsp?'/'+estadoEsp:'');
      }

      // 2. Valida rua (sÃ³ se cidade OK e rua preenchida nos dois lados)
      if (s==='ok' && ruaEsp && ruaVC && simWords(ruaVC, ruaEsp) < 0.4) {
        s='atencao_rua';
        m='Rua divergente: CEP aponta "'+ruaVC+'" mas pedido tem "'+ruaEsp+'"';
      }

      cepCache[cep]={ s, m:m||'', cidade:cidadeVC, estado:estadoVC, rua:ruaVC };
    }
    return cepCache[cep];
  } catch(_) {
    cepCache[cep]={ s:'invalido', m:'Erro ao consultar ViaCEP (sem conexÃ£o)', cidade:'', estado:'', rua:'' };
    return cepCache[cep];
  }
}

async function buscarDet(id, tentativa) {
  tentativa = tentativa || 1;
  try {
    const url = '/api/pedidos?id='+id+(accessToken?'&token='+encodeURIComponent(accessToken):'');
    const r = await fetch(url);
    if (r.status === 429 && tentativa <= 4) {
      await new Promise(res => setTimeout(res, 800 * tentativa));
      return buscarDet(id, tentativa + 1);
    }
    if (!r.ok) return null;
    return await r.json();
  } catch(_) { return null; }
}

async function processarLote(lista) {
  let done = 0;
  g('pw').style.display='block';

  for (let i=0; i<lista.length; i+=4) {
    await Promise.all(lista.slice(i,i+4).map(async p => {
      const det = await buscarDet(p.id);
      const cep = det ? (det.cep||'') : '';
      const cidade = det ? (det.cidade||'') : '';
      const estado = det ? (det.estado||'') : '';
      const rua = det ? (det.endereco||'') : '';
      p.cep=cep; p.cidade=cidade; p.estado=estado; p.rua=rua;

      const loc = valLocal(cep);
      if (loc.s==='invalido') { p.cep_s=loc.s; p.cep_m=loc.m; }
      else {
        const vc = await valViaCep(cep, cidade, estado, rua);
        p.cep_s=vc.s; p.cep_m=vc.m||'';
        if (vc.cidade&&!cidade) { p.cidade=vc.cidade; p.estado=vc.estado; }
      }

      done++;
      const pct = Math.round((done/lista.length)*100);
      g('pf').style.width=pct+'%';
      g('pt').textContent='Detalhes: '+done+' / '+lista.length;
      renderRow(p); updateStats();
    }));
  }
  g('pw').style.display='none';
}

function fmtCep(c) {
  if (!c||c.length!==8) return c||'â';
  return c.slice(0,5)+'-'+c.slice(5);
}

const badges = {
  ok: '<span class="badge b-ok">â CEP vÃ¡lido</span>',
  divergencia:'<span class="badge b-div">â  Cidade divergente</span>',
  atencao_rua:'<span class="badge b-rua">â¡ AtenÃ§Ã£o: rua</span>',
  invalido: '<span class="badge b-inv">â CEP invÃ¡lido</span>',
  carregando: '<span class="badge b-load">â³ Verificando...</span>'
};

const sitBadge = s => {
  if(!s)return'';
  const colors = {
    'Em aberto': 'background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe',
    'Atendido': 'background:#dcfce7;color:#166534;border:1px solid #bbf7d0',
    'Cancelado': 'background:#fee2e2;color:#dc2626;border:1px solid #fecaca',
    'Em andamento': 'background:#fef9c3;color:#854d0e;border:1px solid #fef08a',
    'Verificado': 'background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd',
    'Checkout parcial':'background:#f3e8ff;color:#7e22ce;border:1px solid #e9d5ff',
    'Aguardando pagamento':'background:#ffedd5;color:#9a3412;border:1px solid #fed7aa',
    'Devolucao total':'background:#f1f5f9;color:#475569;border:1px solid #e2e8f0',
  };
  const st=colors[s]||'background:#f5f5f5;color:#888;border:1px solid #e5e5e5';
  return'<span style="display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;font-family:Montserrat,sans-serif;'+st+'">'+s+'</span>';
};

function renderRow(p) {
  let row = document.getElementById('r-'+p.id);
  const badge = badges[p.cep_s||'carregando']||badges.carregando;
  const cuf = p.cidade?(p.cidade+(p.estado?' / '+p.estado:'')):'â / â';
  const det = p.cep_m?('<div class="det-msg">'+p.cep_m+'</div>'):'';
  const html = (p.numeroLI?'<td><b>'+p.numeroLI+'</b><br><span style="font-size:10px;color:#bbb">Bling '+p.numero+'</span></td>':'<td><b>'+p.numero+'</b></td>')+'<td style="max-width:200px">'+escHtml(p.cliente||'')+'</td>'+
    '<td><span class="mono">'+fmtCep(p.cep)+'</span></td>'+
    '<td>'+escHtml(cuf)+'</td><td>'+sitBadge(window.__sitMap&&p.situacao_id?window.__sitMap[p.situacao_id]:'')+'</td><td>'+badge+det+'</td><td></td>';
  if (!row) { row=document.createElement('tr'); row.id='r-'+p.id; g('tb').appendChild(row); }
  row.innerHTML=html; applyFilter();
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateStats() {
  const ok = pedidos.filter(p=>p.cep_s==='ok').length;
  const dv = pedidos.filter(p=>p.cep_s==='divergencia').length;
  const rua = pedidos.filter(p=>p.cep_s==='atencao_rua').length;
  const inv = pedidos.filter(p=>p.cep_s==='invalido').length;
  const tot = pedidos.length;
  g('sTotal').textContent = tot;
  g('sOk').textContent = ok;
  g('sDiv').textContent = dv;
  g('sRua').textContent = rua;
  g('sInv').textContent = inv;
}

function applyFilter() {
  g('tb').querySelectorAll('tr').forEach(row => {
    const id=row.id.replace('r-','');
    const p=pedidos.find(x=>String(x.id)===id);
    if (!p) return;
    row.style.display=(filter==='todos'||filter===p.cep_s)?'':'none';
  });
}

document.querySelectorAll('.fbtn').forEach(b => {
  b.onclick=()=>{
    document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); filter=b.dataset.f; applyFilter();
  };
});

g('btnEx').onclick=()=>{
  const prob=pedidos.filter(p=>p.cep_s!=='ok'&&p.cep_s!=='carregando');
  if (!prob.length){alert('Nenhum problema encontrado.');return;}
  const rows=prob.map(p=>
    [p.numeroLI||'',p.numero,p.cliente,p.cep,p.cidade,p.estado,p.rua,p.situacao,p.cep_s,p.cep_m]
    .map(v=>'"'+(v||'').replace(/"/g,'""')+'"').join(',')
  );
  const csv=['Pedido LI,Pedido Bling,Cliente,CEP,Cidade,UF,Rua,SituaÃ§Ã£o,Status,Mensagem',...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='problemas_cep.csv'; a.click();
};

g('btnB').onclick=async()=>{
  const dtI=g('dtI').value, dtF=g('dtF').value;
  if(!dtI||!dtF){alert('Selecione o perÃ­odo');return;}
  const sitVal=g('selSit').value;

  g('errMsg').style.display='none';
  g('btnB').disabled=true; g('btnB').textContent='Buscando...';
  g('initCard').style.display='none'; g('mainArea').style.display='block';

  // FIX: sem 'let' â usa as variÃ¡veis do escopo externo (updateStats funciona corretamente)
  pedidos=[]; filter='todos'; accessToken=lerTokenLocal()||null;

  try {
    let pag=1;
    while(true){
      let url='/api/pedidos?data_inicio='+dtI+'&data_fim='+dtF+'&pagina='+pag;
      if(accessToken) url+='&token='+encodeURIComponent(accessToken);
      if(sitVal) url+='&idSituacao='+sitVal;
      const r=await fetch(url); const d=await r.json();
      if(!r.ok){
        const emsg=(d.erro||'').toLowerCase();
        if(emsg.includes('invalido')){
          g('errMsg').innerHTML='Token expirado. <b>Reconectando...</b>';
          g('errMsg').style.display='block';
          sessionStorage.setItem('cep_redo','1');
          setTimeout(function(){window.location.href='/api/setup';},1500);
          return;
        }
        const errMsg2=d.erro||'Erro na API '+r.status;
        throw new Error(errMsg2);
      }

      if (d._t) {
        accessToken = d._t;
        // FIX: salva o token no localStorage a cada renovaÃ§Ã£o
        salvarTokenLocal(d._t);

        // Uma vez por sessao: busca situacoes customizadas com token ja obtido
        if (!window.__sitLoaded) {
          window.__sitLoaded = true;
          fetch('/api/situacoes?token=' + encodeURIComponent(d._t))
            .then(r => r.json())
            .then(d2 => {
              const sel = g('selSit');
              const existingVals = new Set(Array.from(sel.options).map(o => String(o.value)));
              (d2.situacoes || []).forEach(st => {
                window.__sitMap[st.id] = st.nome;
                if (!existingVals.has(String(st.id))) {
                  const o = document.createElement('option');
                  o.value = st.id; o.textContent = st.nome;
                  sel.appendChild(o);
                }
              });
              // Re-renderiza todas as rows para pegar situacoes customizadas
              pedidos.forEach(p => renderRow(p));
            }).catch(() => {});
        }
      }

      const lote=d.pedidos||[];
      if(!lote.length) break;

      lote.forEach(p=>{ p.cep_s='carregando'; p.cep=''; pedidos.push(p); renderRow(p); });
      updateStats();
      await processarLote(lote);
      if(!d.hasMore) break;
      pag++;
    }

    // FIX: updateStats final garante contadores corretos ao terminar
    updateStats();

    if(!pedidos.length) {
      g('tb').innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:#bbb">Nenhum pedido encontrado no perÃ­odo</td></tr>';
    }
  } catch(err){
    g('errMsg').textContent=err.message; g('errMsg').style.display='block';
  }
  g('btnB').disabled=false; g('btnB').textContent='ð Buscar pedidos';
};
</script>
</body>
</html>
